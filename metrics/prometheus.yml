# Prometheus configuration file
global:
  scrape_interval: 15s # Set the scrape interval to every 15 seconds
  evaluation_interval: 15s # Evaluate rules every 15 seconds

  external_labels:
    monitor: 'kafka-monitor'

# Alerting — route to Alertmanager inside observability network
alerting:
  alertmanagers:
    - static_configs:
        - targets:
            - alertmanager:9093

# Rule files
rule_files:
  - /etc/prometheus/rules/kafka.rules.yml

# Scrape configurations
scrape_configs:
  # Prometheus self-monitoring
  - job_name: 'prometheus'
    static_configs:
      - targets: ['localhost:9090']

  # Kafka Controllers — scraped via JMX sidecar containers (PR 5).
  # controllerN-jmx bridges kafka-quorum (JMX RMI → controllerN:9101) + observability (:5556/metrics).
  # Controllers themselves are NOT on the observability network; only the sidecars are.
  - job_name: 'kafka-controllers'
    static_configs:
      - targets:
          - 'controller1-jmx:5556'
          - 'controller2-jmx:5556'
          - 'controller3-jmx:5556'
        labels:
          env: 'development'
          cluster: 'kafka-kraft-cluster'
          role: 'controller'

  # Kafka Brokers — scraped via JMX sidecar containers (PR 5).
  # brokerN-jmx bridges kafka-data (JMX RMI → brokerN:9101) + observability (:5556/metrics).
  # Brokers themselves are NOT on the observability network; only the sidecars are.
  # This prevents any observability-zone container from reaching broker:9092 (data-plane entry point).
  - job_name: 'kafka-brokers'
    static_configs:
      - targets:
          - 'broker1-jmx:5556'
          - 'broker2-jmx:5556'
          - 'broker3-jmx:5556'
        labels:
          env: 'development'
          cluster: 'kafka-kraft-cluster'
          role: 'broker'

  # KMinion — Kafka consumer lag and topic metrics
  - job_name: 'kminion'
    static_configs:
      - targets: ['kminion:8080']
        labels:
          env: 'development'
          cluster: 'kafka-kraft-cluster'

  # OTel Collector self-metrics
  - job_name: 'otel-collector'
    static_configs:
      - targets: ['otel-collector:8889']
        labels:
          env: 'development'

  # Alertmanager self-metrics
  - job_name: 'alertmanager'
    static_configs:
      - targets: ['alertmanager:9093']
        labels:
          env: 'development'

  # Blackbox Exporter
  - job_name: 'blackbox-exporter'
    static_configs:
      - targets: ['blackbox-exporter:9115']
        labels:
          env: 'development'

  # Cruise Control — deferred to PR#5
  # - job_name: 'cruise-control'
  #   static_configs:
  #     - targets: ['cruise-control:9090']
  #       labels:
  #         env: 'development'
  #         cluster: 'kafka-kraft-cluster'

  # Loki self-metrics
  - job_name: 'loki'
    metrics_path: /metrics
    static_configs:
      - targets: ['loki:3100']
        labels:
          env: 'development'

  # Tempo self-metrics
  - job_name: 'tempo'
    metrics_path: /metrics
    static_configs:
      - targets: ['tempo:3200']
        labels:
          env: 'development'

  # Pyroscope self-metrics
  - job_name: 'pyroscope'
    metrics_path: /metrics
    static_configs:
      - targets: ['pyroscope:4040']
        labels:
          env: 'development'
