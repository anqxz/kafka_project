# Kafka + observability stack. Every service builds from services/<name>/;
# central version pins live in .env. Network zones: kafka-quorum (KRaft),
# kafka-data (clients↔brokers), observability (scrape+telemetry), edge (host UIs).

services:

  # Controllers (KRaft controllers) — kafka-quorum only + observability for scrape.
  controller1:
    build:
      context: ../services/controller
      args:
        BASE_TAG: "${KAFKA_TAG}"
    container_name: controller1
    environment:
      KAFKA_PROCESS_ROLES: "controller"
      KAFKA_NODE_ID: "1"
      KAFKA_CLUSTER_ID: "1490b9b6-15d4-40fc-b963-5ffa822835fd"
      CLUSTER_ID: "1490b9b6-15d4-40fc-b963-5ffa822835fd"
      KAFKA_CONTROLLER_QUORUM_VOTERS: "1@controller1:9093,2@controller2:9093,3@controller3:9093"
      KAFKA_LISTENERS: "CONTROLLER://:9093"
      KAFKA_LISTENER_SECURITY_PROTOCOL_MAP: "CONTROLLER:PLAINTEXT"
      KAFKA_CONTROLLER_LISTENER_NAMES: "CONTROLLER"
      KAFKA_LOG4J_LOGGERS: "org.apache.kafka=INFO"
      KAFKA_JMX_PORT: "9101"
      KAFKA_JMX_HOSTNAME: "controller1"
      KAFKA_OPTS: "-javaagent:/opt/jmx_exporter/jmx_prometheus_javaagent.jar=7071:/opt/jmx_exporter/kafka-config.yml -javaagent:/opt/agents/opentelemetry-javaagent.jar"
      OTEL_SERVICE_NAME: "controller1"
      OTEL_EXPORTER_OTLP_ENDPOINT: "http://otel-collector:4318"
      OTEL_EXPORTER_OTLP_PROTOCOL: "http/protobuf"
      OTEL_TRACES_EXPORTER: "otlp"
      OTEL_LOGS_EXPORTER: "otlp"
      OTEL_METRICS_EXPORTER: "none"
    volumes:
      - controller1-data:/var/lib/kafka/data
    networks:
      - kafka-quorum
      - observability

  controller2:
    build:
      context: ../services/controller
      args:
        BASE_TAG: "${KAFKA_TAG}"
    container_name: controller2
    environment:
      KAFKA_PROCESS_ROLES: "controller"
      KAFKA_NODE_ID: "2"
      KAFKA_CLUSTER_ID: "1490b9b6-15d4-40fc-b963-5ffa822835fd"
      CLUSTER_ID: "1490b9b6-15d4-40fc-b963-5ffa822835fd"
      KAFKA_CONTROLLER_QUORUM_VOTERS: "1@controller1:9093,2@controller2:9093,3@controller3:9093"
      KAFKA_LISTENERS: "CONTROLLER://:9093"
      KAFKA_LISTENER_SECURITY_PROTOCOL_MAP: "CONTROLLER:PLAINTEXT"
      KAFKA_CONTROLLER_LISTENER_NAMES: "CONTROLLER"
      KAFKA_LOG4J_LOGGERS: "org.apache.kafka=INFO"
      KAFKA_JMX_PORT: "9101"
      KAFKA_JMX_HOSTNAME: "controller2"
      KAFKA_OPTS: "-javaagent:/opt/jmx_exporter/jmx_prometheus_javaagent.jar=7071:/opt/jmx_exporter/kafka-config.yml -javaagent:/opt/agents/opentelemetry-javaagent.jar"
      OTEL_SERVICE_NAME: "controller2"
      OTEL_EXPORTER_OTLP_ENDPOINT: "http://otel-collector:4318"
      OTEL_EXPORTER_OTLP_PROTOCOL: "http/protobuf"
      OTEL_TRACES_EXPORTER: "otlp"
      OTEL_LOGS_EXPORTER: "otlp"
      OTEL_METRICS_EXPORTER: "none"
    volumes:
      - controller2-data:/var/lib/kafka/data
    networks:
      - kafka-quorum
      - observability

  controller3:
    build:
      context: ../services/controller
      args:
        BASE_TAG: "${KAFKA_TAG}"
    container_name: controller3
    environment:
      KAFKA_PROCESS_ROLES: "controller"
      KAFKA_NODE_ID: "3"
      KAFKA_CLUSTER_ID: "1490b9b6-15d4-40fc-b963-5ffa822835fd"
      CLUSTER_ID: "1490b9b6-15d4-40fc-b963-5ffa822835fd"
      KAFKA_CONTROLLER_QUORUM_VOTERS: "1@controller1:9093,2@controller2:9093,3@controller3:9093"
      KAFKA_LISTENERS: "CONTROLLER://:9093"
      KAFKA_LISTENER_SECURITY_PROTOCOL_MAP: "CONTROLLER:PLAINTEXT"
      KAFKA_CONTROLLER_LISTENER_NAMES: "CONTROLLER"
      KAFKA_LOG4J_LOGGERS: "org.apache.kafka=INFO"
      KAFKA_JMX_PORT: "9101"
      KAFKA_JMX_HOSTNAME: "controller3"
      KAFKA_OPTS: "-javaagent:/opt/jmx_exporter/jmx_prometheus_javaagent.jar=7071:/opt/jmx_exporter/kafka-config.yml -javaagent:/opt/agents/opentelemetry-javaagent.jar"
      OTEL_SERVICE_NAME: "controller3"
      OTEL_EXPORTER_OTLP_ENDPOINT: "http://otel-collector:4318"
      OTEL_EXPORTER_OTLP_PROTOCOL: "http/protobuf"
      OTEL_TRACES_EXPORTER: "otlp"
      OTEL_LOGS_EXPORTER: "otlp"
      OTEL_METRICS_EXPORTER: "none"
    volumes:
      - controller3-data:/var/lib/kafka/data
    networks:
      - kafka-quorum
      - observability

  # Brokers — quorum (talk to controllers), data (clients), observability (scrape),
  # edge (EXTERNAL listener published to 127.0.0.1 for host producers/consumers).
  broker1:
    build:
      context: ../services/broker
      args:
        BASE_TAG: "${KAFKA_TAG}"
    container_name: broker1
    environment:
      KAFKA_PROCESS_ROLES: "broker"
      KAFKA_NODE_ID: "4"
      KAFKA_CLUSTER_ID: "1490b9b6-15d4-40fc-b963-5ffa822835fd"
      CLUSTER_ID: "1490b9b6-15d4-40fc-b963-5ffa822835fd"
      KAFKA_CONTROLLER_QUORUM_VOTERS: "1@controller1:9093,2@controller2:9093,3@controller3:9093"
      KAFKA_LISTENERS: "PLAINTEXT://:9092,EXTERNAL://:29092"
      KAFKA_ADVERTISED_LISTENERS: "PLAINTEXT://broker1:9092,EXTERNAL://localhost:9092"
      KAFKA_INTER_BROKER_LISTENER_NAME: "PLAINTEXT"
      KAFKA_CONTROLLER_LISTENER_NAMES: "CONTROLLER"
      KAFKA_LISTENER_SECURITY_PROTOCOL_MAP: "PLAINTEXT:PLAINTEXT,EXTERNAL:PLAINTEXT,CONTROLLER:PLAINTEXT"
      KAFKA_ALLOW_PLAINTEXT_LISTENER: "yes"
      KAFKA_DEFAULT_REPLICATION_FACTOR: "3"
      KAFKA_MIN_INSYNC_REPLICAS: "2"
      KAFKA_OFFSETS_TOPIC_REPLICATION_FACTOR: "3"
      KAFKA_TRANSACTION_STATE_LOG_REPLICATION_FACTOR: "3"
      KAFKA_TRANSACTION_STATE_LOG_MIN_ISR: "2"
      KAFKA_LOG4J_LOGGERS: "org.apache.kafka=INFO"
      KAFKA_JMX_PORT: "9101"
      KAFKA_JMX_HOSTNAME: "broker1"
      KAFKA_OPTS: "-javaagent:/opt/jmx_exporter/jmx_prometheus_javaagent.jar=7071:/opt/jmx_exporter/kafka-config.yml -javaagent:/opt/agents/opentelemetry-javaagent.jar"
      OTEL_SERVICE_NAME: "broker1"
      OTEL_EXPORTER_OTLP_ENDPOINT: "http://otel-collector:4318"
      OTEL_EXPORTER_OTLP_PROTOCOL: "http/protobuf"
      OTEL_TRACES_EXPORTER: "otlp"
      OTEL_LOGS_EXPORTER: "otlp"
      OTEL_METRICS_EXPORTER: "none"
      KAFKA_METRIC_REPORTERS: "com.linkedin.kafka.cruisecontrol.metricsreporter.CruiseControlMetricsReporter"
      KAFKA_CRUISE_CONTROL_METRICS_TOPIC_AUTO_CREATE: "true"
      KAFKA_CRUISE_CONTROL_METRICS_TOPIC_NUM_PARTITIONS: "1"
      KAFKA_CRUISE_CONTROL_METRICS_TOPIC_REPLICATION_FACTOR: "3"
    ports:
      - "127.0.0.1:9092:29092"
    depends_on:
      - controller1
      - controller2
      - controller3
    volumes:
      - broker1-data:/var/lib/kafka/data
    networks:
      - kafka-quorum
      - kafka-data
      - observability
      - edge

  broker2:
    build:
      context: ../services/broker
      args:
        BASE_TAG: "${KAFKA_TAG}"
    container_name: broker2
    environment:
      KAFKA_PROCESS_ROLES: "broker"
      KAFKA_NODE_ID: "5"
      KAFKA_CLUSTER_ID: "1490b9b6-15d4-40fc-b963-5ffa822835fd"
      CLUSTER_ID: "1490b9b6-15d4-40fc-b963-5ffa822835fd"
      KAFKA_CONTROLLER_QUORUM_VOTERS: "1@controller1:9093,2@controller2:9093,3@controller3:9093"
      KAFKA_LISTENERS: "PLAINTEXT://:9092,EXTERNAL://:29092"
      KAFKA_ADVERTISED_LISTENERS: "PLAINTEXT://broker2:9092,EXTERNAL://localhost:9093"
      KAFKA_LISTENER_SECURITY_PROTOCOL_MAP: "PLAINTEXT:PLAINTEXT,EXTERNAL:PLAINTEXT,CONTROLLER:PLAINTEXT"
      KAFKA_INTER_BROKER_LISTENER_NAME: "PLAINTEXT"
      KAFKA_CONTROLLER_LISTENER_NAMES: "CONTROLLER"
      KAFKA_ALLOW_PLAINTEXT_LISTENER: "yes"
      KAFKA_DEFAULT_REPLICATION_FACTOR: "3"
      KAFKA_MIN_INSYNC_REPLICAS: "2"
      KAFKA_OFFSETS_TOPIC_REPLICATION_FACTOR: "3"
      KAFKA_TRANSACTION_STATE_LOG_REPLICATION_FACTOR: "3"
      KAFKA_TRANSACTION_STATE_LOG_MIN_ISR: "2"
      KAFKA_LOG4J_LOGGERS: "org.apache.kafka=INFO"
      KAFKA_JMX_PORT: "9101"
      KAFKA_JMX_HOSTNAME: "broker2"
      KAFKA_OPTS: "-javaagent:/opt/jmx_exporter/jmx_prometheus_javaagent.jar=7071:/opt/jmx_exporter/kafka-config.yml -javaagent:/opt/agents/opentelemetry-javaagent.jar"
      OTEL_SERVICE_NAME: "broker2"
      OTEL_EXPORTER_OTLP_ENDPOINT: "http://otel-collector:4318"
      OTEL_EXPORTER_OTLP_PROTOCOL: "http/protobuf"
      OTEL_TRACES_EXPORTER: "otlp"
      OTEL_LOGS_EXPORTER: "otlp"
      OTEL_METRICS_EXPORTER: "none"
      KAFKA_METRIC_REPORTERS: "com.linkedin.kafka.cruisecontrol.metricsreporter.CruiseControlMetricsReporter"
      KAFKA_CRUISE_CONTROL_METRICS_TOPIC_AUTO_CREATE: "true"
      KAFKA_CRUISE_CONTROL_METRICS_TOPIC_NUM_PARTITIONS: "1"
      KAFKA_CRUISE_CONTROL_METRICS_TOPIC_REPLICATION_FACTOR: "3"
    ports:
      - "127.0.0.1:9093:29092"
    depends_on:
      - controller1
      - controller2
      - controller3
    volumes:
      - broker2-data:/var/lib/kafka/data
    networks:
      - kafka-quorum
      - kafka-data
      - observability
      - edge

  broker3:
    build:
      context: ../services/broker
      args:
        BASE_TAG: "${KAFKA_TAG}"
    container_name: broker3
    environment:
      KAFKA_PROCESS_ROLES: "broker"
      KAFKA_NODE_ID: "6"
      KAFKA_CLUSTER_ID: "1490b9b6-15d4-40fc-b963-5ffa822835fd"
      CLUSTER_ID: "1490b9b6-15d4-40fc-b963-5ffa822835fd"
      KAFKA_CONTROLLER_QUORUM_VOTERS: "1@controller1:9093,2@controller2:9093,3@controller3:9093"
      KAFKA_LISTENERS: "PLAINTEXT://:9092,EXTERNAL://:29092"
      KAFKA_ADVERTISED_LISTENERS: "PLAINTEXT://broker3:9092,EXTERNAL://localhost:9094"
      KAFKA_LISTENER_SECURITY_PROTOCOL_MAP: "PLAINTEXT:PLAINTEXT,EXTERNAL:PLAINTEXT,CONTROLLER:PLAINTEXT"
      KAFKA_INTER_BROKER_LISTENER_NAME: "PLAINTEXT"
      KAFKA_CONTROLLER_LISTENER_NAMES: "CONTROLLER"
      KAFKA_ALLOW_PLAINTEXT_LISTENER: "yes"
      KAFKA_DEFAULT_REPLICATION_FACTOR: "3"
      KAFKA_MIN_INSYNC_REPLICAS: "2"
      KAFKA_OFFSETS_TOPIC_REPLICATION_FACTOR: "3"
      KAFKA_TRANSACTION_STATE_LOG_REPLICATION_FACTOR: "3"
      KAFKA_TRANSACTION_STATE_LOG_MIN_ISR: "2"
      KAFKA_LOG4J_LOGGERS: "org.apache.kafka=INFO"
      KAFKA_JMX_PORT: "9101"
      KAFKA_JMX_HOSTNAME: "broker3"
      KAFKA_OPTS: "-javaagent:/opt/jmx_exporter/jmx_prometheus_javaagent.jar=7071:/opt/jmx_exporter/kafka-config.yml -javaagent:/opt/agents/opentelemetry-javaagent.jar"
      OTEL_SERVICE_NAME: "broker3"
      OTEL_EXPORTER_OTLP_ENDPOINT: "http://otel-collector:4318"
      OTEL_EXPORTER_OTLP_PROTOCOL: "http/protobuf"
      OTEL_TRACES_EXPORTER: "otlp"
      OTEL_LOGS_EXPORTER: "otlp"
      OTEL_METRICS_EXPORTER: "none"
      KAFKA_METRIC_REPORTERS: "com.linkedin.kafka.cruisecontrol.metricsreporter.CruiseControlMetricsReporter"
      KAFKA_CRUISE_CONTROL_METRICS_TOPIC_AUTO_CREATE: "true"
      KAFKA_CRUISE_CONTROL_METRICS_TOPIC_NUM_PARTITIONS: "1"
      KAFKA_CRUISE_CONTROL_METRICS_TOPIC_REPLICATION_FACTOR: "3"
    ports:
      - "127.0.0.1:9094:29092"
    depends_on:
      - controller1
      - controller2
      - controller3
    volumes:
      - broker3-data:/var/lib/kafka/data
    networks:
      - kafka-quorum
      - kafka-data
      - observability
      - edge

  # AKHQ — data (client connectivity to brokers, JMX via container hostnames) + edge (UI on 127.0.0.1).
  akhq:
    build:
      context: ../services/akhq
      args:
        BASE_TAG: "${AKHQ_TAG}"
    container_name: akhq
    ports:
      - "127.0.0.1:8080:8080"
    depends_on:
      - broker1
      - broker2
      - broker3
      - kafka-connect
    networks:
      - kafka-data
      - edge

  # LocalStack — reachable by Connect on kafka-data; host access on 127.0.0.1:4566 for aws CLI/tests.
  localstack:
    build:
      context: ../services/localstack
      args:
        BASE_TAG: "${LOCALSTACK_TAG}"
    container_name: localstack
    environment:
      SERVICES: s3,ssm,secretsmanager,iam,sts,cloudwatch,logs,sns,sqs,lambda,kms,events
      DEBUG: 0
      DATA_DIR: /var/lib/localstack
      HOSTNAME_EXTERNAL: localstack
      AWS_DEFAULT_REGION: us-east-1
      PERSIST_STORAGE: 1
      EAGER_SERVICE_LOADING: 1
      SKIP_SSL_CERT_DOWNLOAD: 1
      LS_LOG: warn
    ports:
      - "127.0.0.1:4566:4566"
    volumes:
      - localstack-data:/var/lib/localstack
      # docker.sock mount disabled: rootless daemon (see LAMBDA_EXECUTOR note above).
      # - /var/run/docker.sock:/var/run/docker.sock
    tmpfs:
      - /tmp
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:4566/_localstack/health"]
      interval: 10s
      timeout: 5s
      retries: 5
      start_period: 30s
    networks:
      - kafka-data
      - edge

  # Schema Registry — kafka-data only; UI on 127.0.0.1 via edge for developer convenience.
  schema-registry:
    build:
      context: ../services/schema-registry
      args:
        BASE_TAG: "${SCHEMA_REGISTRY_TAG}"
    container_name: schema-registry
    environment:
      SCHEMA_REGISTRY_HOST_NAME: schema-registry
      SCHEMA_REGISTRY_KAFKASTORE_BOOTSTRAP_SERVERS: "broker1:9092,broker2:9092,broker3:9092"
      SCHEMA_REGISTRY_LISTENERS: "http://0.0.0.0:8081"
      SCHEMA_REGISTRY_DEBUG: "true"
    ports:
      - "127.0.0.1:8081:8081"
    depends_on:
      - broker1
      - broker2
      - broker3
    networks:
      - kafka-data
      - edge

  # Kafka Connect — kafka-data (brokers + localstack S3) + edge (REST 127.0.0.1:8083).
  kafka-connect:
    build:
      context: ../services/kafka-connect
      args:
        BASE_TAG: "${CONNECT_TAG}"
    container_name: kafka-connect
    environment:
      CONNECT_BOOTSTRAP_SERVERS: "broker1:9092,broker2:9092,broker3:9092"
      CONNECT_REST_PORT: 8083
      CONNECT_REST_ADVERTISED_HOST_NAME: "kafka-connect"
      CONNECT_GROUP_ID: "kafka-connect-cluster"
      CONNECT_CONFIG_STORAGE_TOPIC: "_connect-configs"
      CONNECT_CONFIG_STORAGE_REPLICATION_FACTOR: 3
      CONNECT_OFFSET_STORAGE_TOPIC: "_connect-offsets"
      CONNECT_OFFSET_STORAGE_REPLICATION_FACTOR: 3
      CONNECT_STATUS_STORAGE_TOPIC: "_connect-status"
      CONNECT_STATUS_STORAGE_REPLICATION_FACTOR: 3
      CONNECT_KEY_CONVERTER: "org.apache.kafka.connect.json.JsonConverter"
      CONNECT_VALUE_CONVERTER: "org.apache.kafka.connect.json.JsonConverter"
      CONNECT_KEY_CONVERTER_SCHEMAS_ENABLE: "false"
      CONNECT_VALUE_CONVERTER_SCHEMAS_ENABLE: "false"
      CONNECT_PLUGIN_PATH: "/usr/share/java,/usr/share/confluent-hub-components"
      CONNECT_LOG4J_LOGGERS: "org.apache.kafka.connect=INFO"
      AWS_ACCESS_KEY_ID: "test"
      AWS_SECRET_ACCESS_KEY: "test"
      AWS_DEFAULT_REGION: "us-east-1"
    ports:
      - "127.0.0.1:8083:8083"
    depends_on:
      localstack:
        condition: service_healthy
      broker1:
        condition: service_started
      broker2:
        condition: service_started
      broker3:
        condition: service_started
      schema-registry:
        condition: service_started
    command:
      - bash
      - -c
      - |
        echo "Installing S3 Sink Connector..."
        confluent-hub install --no-prompt confluentinc/kafka-connect-s3:10.5.0
        echo "Launching Kafka Connect..."
        /etc/confluent/docker/run
    networks:
      - kafka-data
      - edge

  # Prometheus — observability (scrape targets) + edge (UI 127.0.0.1:9090).
  prometheus:
    build:
      context: ../services/prometheus
      args:
        BASE_TAG: "${PROMETHEUS_TAG}"
    container_name: prometheus
    command:
      - '--config.file=/etc/prometheus/prometheus.yml'
      - '--storage.tsdb.path=/prometheus'
      - '--web.console.libraries=/usr/share/prometheus/console_libraries'
      - '--web.console.templates=/usr/share/prometheus/consoles'
    ports:
      - "127.0.0.1:9090:9090"
    volumes:
      - prometheus-data:/prometheus
    depends_on:
      - broker1
      - broker2
      - broker3
    networks:
      - observability
      - edge

  # Grafana — observability (reach Prometheus) + edge (UI 127.0.0.1:3000).
  grafana:
    build:
      context: ../services/grafana
      args:
        BASE_TAG: "${GRAFANA_TAG}"
    container_name: grafana
    environment:
      GF_SECURITY_ADMIN_USER: admin
      GF_SECURITY_ADMIN_PASSWORD: admin
    ports:
      - "127.0.0.1:3000:3000"
    volumes:
      - grafana-data:/var/lib/grafana
    depends_on:
      - prometheus
      - loki
      - tempo
      - pyroscope
    networks:
      - observability
      - edge

  # ── PR 2: Observability + Platform Stack ────────────────────────────────────

  # KMinion — Kafka lag/topic metrics; scraped by Prometheus internally.
  # Networks: kafka-data (brokers) + observability (Prometheus scrape).
  kminion:
    build:
      context: ../services/kminion
      args:
        BASE_TAG: "${KMINION_TAG}"
    container_name: kminion
    restart: unless-stopped
    environment:
      CONFIG_FILEPATH: /etc/kminion/config.yaml
    depends_on:
      - broker1
      - broker2
      - broker3
    healthcheck:
      test: ["CMD", "wget", "-qO-", "http://localhost:8080/metrics"]
      interval: 15s
      timeout: 5s
      retries: 5
      start_period: 20s
    networks:
      - kafka-data
      - observability

  # OTel Collector — single pipeline for logs, traces, metrics.
  # Networks: observability only (loki/tempo/prometheus targets are co-located).
  otel-collector:
    build:
      context: ../services/otel-collector
      args:
        BASE_TAG: "${OTEL_COLLECTOR_TAG}"
    container_name: otel-collector
    command: ["--config=/etc/otelcol/config.yaml"]
    ports:
      - "127.0.0.1:4317:4317"   # OTLP gRPC
      - "127.0.0.1:4318:4318"   # OTLP HTTP
    healthcheck:
      test: ["CMD", "wget", "-qO-", "http://localhost:13133/"]
      interval: 15s
      timeout: 5s
      retries: 5
      start_period: 15s
    networks:
      - observability

  # Loki — log aggregation backend; single-binary mode, filesystem storage.
  loki:
    build:
      context: ../services/loki
      args:
        BASE_TAG: "${LOKI_TAG}"
    container_name: loki
    command: ["-config.file=/etc/loki/config.yaml"]
    volumes:
      - loki-data:/loki
    healthcheck:
      test: ["CMD", "wget", "-qO-", "http://localhost:3100/ready"]
      interval: 15s
      timeout: 5s
      retries: 10
      start_period: 30s
    networks:
      - observability

  # Tempo — distributed tracing backend; single-binary mode, local storage.
  tempo:
    build:
      context: ../services/tempo
      args:
        BASE_TAG: "${TEMPO_TAG}"
    container_name: tempo
    command: ["-config.file=/etc/tempo/config.yaml"]
    volumes:
      - tempo-data:/tmp/tempo
    healthcheck:
      test: ["CMD", "wget", "-qO-", "http://localhost:3200/ready"]
      interval: 15s
      timeout: 5s
      retries: 10
      start_period: 30s
    networks:
      - observability

  # Pyroscope — continuous profiling backend; single-binary mode.
  pyroscope:
    build:
      context: ../services/pyroscope
      args:
        BASE_TAG: "${PYROSCOPE_TAG}"
    container_name: pyroscope
    command: ["server", "--config.file=/etc/pyroscope/config.yaml"]
    volumes:
      - pyroscope-data:/data
    healthcheck:
      test: ["CMD", "wget", "-qO-", "http://localhost:4040/ready"]
      interval: 15s
      timeout: 5s
      retries: 10
      start_period: 30s
    networks:
      - observability

  # Alertmanager — alert routing to ntfy webhook.
  # Networks: observability only — not exposed to host.
  alertmanager:
    build:
      context: ../services/alertmanager
      args:
        BASE_TAG: "${ALERTMANAGER_TAG}"
    container_name: alertmanager
    command:
      - '--config.file=/etc/alertmanager/alertmanager.yml'
      - '--storage.path=/alertmanager'
    volumes:
      - alertmanager-data:/alertmanager
    depends_on:
      - prometheus
    healthcheck:
      test: ["CMD", "wget", "-qO-", "http://localhost:9093/-/healthy"]
      interval: 15s
      timeout: 5s
      retries: 5
      start_period: 10s
    networks:
      - observability

  # Blackbox Exporter — synthetic HTTP/TCP probe endpoint.
  blackbox-exporter:
    build:
      context: ../services/blackbox-exporter
      args:
        BASE_TAG: "${BLACKBOX_EXPORTER_TAG}"
    container_name: blackbox-exporter
    command:
      - '--config.file=/etc/blackbox_exporter/blackbox.yml'
    healthcheck:
      test: ["CMD", "wget", "-qO-", "http://localhost:9115/-/healthy"]
      interval: 15s
      timeout: 5s
      retries: 5
      start_period: 10s
    networks:
      - observability

  ntfy:
    build:
      context: ../services/ntfy
      args:
        BASE_TAG: "${NTFY_TAG}"
    container_name: ntfy
    command: ["serve", "--config=/etc/ntfy/ntfy.yml"]
    ports:
      - "127.0.0.1:8082:80"
    volumes:
      - ntfy-data:/var/lib/ntfy
    healthcheck:
      test: ["CMD", "wget", "-qO-", "http://localhost:80/v1/health"]
      interval: 15s
      timeout: 5s
      retries: 5
      start_period: 10s
    networks:
      - edge
      - observability

  # === PHASE-7 new services ===

  cruise-control:
    build:
      context: ../services/cruise-control
      args:
        CC_VERSION: "${CC_VERSION}"
        GRADLE_TAG: "${CC_GRADLE_TAG}"
        RUNTIME_TAG: "${CC_RUNTIME_TAG}"
    container_name: cruise-control
    depends_on:
      - broker1
      - broker2
      - broker3
    ports:
      - "127.0.0.1:9095:9090"
    networks:
      - kafka-data
      - observability

  kroxylicious:
    build:
      context: ../services/kroxylicious
      args:
        BASE_TAG: "${KROXYLICIOUS_TAG}"
    container_name: kroxylicious
    depends_on:
      - broker1
      - localstack
    ports:
      - "127.0.0.1:9192:9192"
    networks:
      - kafka-data
      - observability
      - edge

  toxiproxy:
    build:
      context: ../services/toxiproxy
      args:
        BASE_TAG: "${TOXIPROXY_TAG}"
    container_name: toxiproxy
    ports:
      - "127.0.0.1:8474:8474"
    networks:
      - kafka-data
      - edge

  mcp-kafka:
    build:
      context: ../services/mcp-kafka
      args:
        PYTHON_TAG: "${MCP_KAFKA_PYTHON_TAG}"
    container_name: mcp-kafka
    environment:
      KAFKA_BOOTSTRAP_SERVERS: "broker1:9092,broker2:9092,broker3:9092"
      CONNECT_URL: "http://kafka-connect:8083"
      SCHEMA_REGISTRY_URL: "http://schema-registry:8081"
      PROMETHEUS_URL: "http://prometheus:9090"
      MCP_MODE: "read-only"
      MCP_TRANSPORT: "sse"
      MCP_PORT: "3001"
    depends_on:
      - broker1
      - kafka-connect
    ports:
      - "127.0.0.1:3001:3001"
    networks:
      - kafka-data
      - observability
      - edge

  loadgen:
    build:
      context: ../services/loadgen
      args:
        PYTHON_TAG: "${LOADGEN_PYTHON_TAG}"
    container_name: loadgen
    restart: on-failure
    environment:
      KAFKA_BOOTSTRAP_SERVERS: "broker1:9092,broker2:9092,broker3:9092"
      LOADGEN_TOPIC: "events"
      LOADGEN_RATE: "5"
      LOADGEN_DURATION: "0"
      OTEL_EXPORTER_OTLP_ENDPOINT: "http://otel-collector:4318"
    depends_on:
      - broker1
      - otel-collector
    networks:
      - kafka-data
      - observability

networks:
  kafka-quorum:
    name: kafka-quorum
    driver: bridge
    internal: true
    ipam:
      config:
        - subnet: 10.89.3.0/24
          gateway: 10.89.3.1
  kafka-data:
    name: kafka-data
    driver: bridge
    internal: true
    ipam:
      config:
        - subnet: 10.89.2.0/24
          gateway: 10.89.2.1
  observability:
    name: observability
    driver: bridge
    internal: true
    ipam:
      config:
        - subnet: 10.89.0.0/24
          gateway: 10.89.0.1
  edge:
    name: edge
    driver: bridge
    ipam:
      config:
        - subnet: 10.89.1.0/24
          gateway: 10.89.1.1

volumes:
  controller1-data:
  controller2-data:
  controller3-data:
  broker1-data:
  broker2-data:
  broker3-data:
  prometheus-data:
  grafana-data:
  localstack-data:
  loki-data:
  tempo-data:
  pyroscope-data:
  alertmanager-data:
  ntfy-data:
