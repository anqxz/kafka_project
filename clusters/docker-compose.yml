version: "3.8"

# PR 1 — Network segmentation (see 01-NETWORK-ARCHITECTURE.md).
# Four zones replace the flat kafka-project_default network:
#   kafka-quorum    controllers <-> brokers (metadata plane, KRaft)
#   kafka-data      producers/consumers/connect/schema-registry/akhq <-> brokers
#   observability   prometheus scrape targets (jmx-exporter :7071) and grafana
#   edge            host-facing UIs, all bound to 127.0.0.1
#
# Removed from host: controller quorum ports (19093-19095), JMX RMI (9101-9103, 19101-19103),
# JMX-exporter scrape ports (7071-7073, 17071-17073). None of these should ever be host-reachable.

services:

  # Controllers (KRaft controllers) — kafka-quorum only + observability for scrape.
  controller1:
    image: confluentinc/cp-kafka:latest
    container_name: controller1
    environment:
      KAFKA_PROCESS_ROLES: "controller"
      KAFKA_NODE_ID: "1"
      KAFKA_CLUSTER_ID: "1490b9b6-15d4-40fc-b963-5ffa822835fd"
      KAFKA_CONTROLLER_QUORUM_VOTERS: "1@controller1:9093,2@controller2:9093,3@controller3:9093"
      KAFKA_LISTENERS: "CONTROLLER://:9093"
      KAFKA_LISTENER_SECURITY_PROTOCOL_MAP: "CONTROLLER:PLAINTEXT"
      KAFKA_CONTROLLER_LISTENER_NAMES: "CONTROLLER"
      KAFKA_LOG4J_LOGGERS: "org.apache.kafka=DEBUG"
      KAFKA_JMX_PORT: "9101"
      KAFKA_JMX_HOSTNAME: "controller1"
      KAFKA_OPTS: "-javaagent:/opt/jmx_exporter/jmx_prometheus_javaagent.jar=7071:/opt/jmx_exporter/kafka-config.yml"
    volumes:
      - controller1-data:/var/lib/kafka/data
      - ../metrics/jmx-exporter:/opt/jmx_exporter
    networks:
      - kafka-quorum
      - observability

  controller2:
    image: confluentinc/cp-kafka:latest
    container_name: controller2
    environment:
      KAFKA_PROCESS_ROLES: "controller"
      KAFKA_NODE_ID: "2"
      KAFKA_CLUSTER_ID: "1490b9b6-15d4-40fc-b963-5ffa822835fd"
      KAFKA_CONTROLLER_QUORUM_VOTERS: "1@controller1:9093,2@controller2:9093,3@controller3:9093"
      KAFKA_LISTENERS: "CONTROLLER://:9093"
      KAFKA_LISTENER_SECURITY_PROTOCOL_MAP: "CONTROLLER:PLAINTEXT"
      KAFKA_CONTROLLER_LISTENER_NAMES: "CONTROLLER"
      KAFKA_LOG4J_LOGGERS: "org.apache.kafka=DEBUG"
      KAFKA_JMX_PORT: "9101"
      KAFKA_JMX_HOSTNAME: "controller2"
      KAFKA_OPTS: "-javaagent:/opt/jmx_exporter/jmx_prometheus_javaagent.jar=7071:/opt/jmx_exporter/kafka-config.yml"
    volumes:
      - controller2-data:/var/lib/kafka/data
      - ../metrics/jmx-exporter:/opt/jmx_exporter
    networks:
      - kafka-quorum
      - observability

  controller3:
    image: confluentinc/cp-kafka:latest
    container_name: controller3
    environment:
      KAFKA_PROCESS_ROLES: "controller"
      KAFKA_NODE_ID: "3"
      KAFKA_CLUSTER_ID: "1490b9b6-15d4-40fc-b963-5ffa822835fd"
      KAFKA_CONTROLLER_QUORUM_VOTERS: "1@controller1:9093,2@controller2:9093,3@controller3:9093"
      KAFKA_LISTENERS: "CONTROLLER://:9093"
      KAFKA_LISTENER_SECURITY_PROTOCOL_MAP: "CONTROLLER:PLAINTEXT"
      KAFKA_CONTROLLER_LISTENER_NAMES: "CONTROLLER"
      KAFKA_LOG4J_LOGGERS: "org.apache.kafka=DEBUG"
      KAFKA_JMX_PORT: "9101"
      KAFKA_JMX_HOSTNAME: "controller3"
      KAFKA_OPTS: "-javaagent:/opt/jmx_exporter/jmx_prometheus_javaagent.jar=7071:/opt/jmx_exporter/kafka-config.yml"
    volumes:
      - controller3-data:/var/lib/kafka/data
      - ../metrics/jmx-exporter:/opt/jmx_exporter
    networks:
      - kafka-quorum
      - observability

  # Brokers — quorum (talk to controllers), data (clients), observability (scrape),
  # edge (EXTERNAL listener published to 127.0.0.1 for host producers/consumers).
  broker1:
    image: confluentinc/cp-kafka:latest
    container_name: broker1
    environment:
      KAFKA_PROCESS_ROLES: "broker"
      KAFKA_NODE_ID: "4"
      KAFKA_CLUSTER_ID: "1490b9b6-15d4-40fc-b963-5ffa822835fd"
      KAFKA_CONTROLLER_QUORUM_VOTERS: "1@controller1:9093,2@controller2:9093,3@controller3:9093"
      KAFKA_LISTENERS: "PLAINTEXT://:9092,EXTERNAL://:29092"
      KAFKA_ADVERTISED_LISTENERS: "PLAINTEXT://broker1:9092,EXTERNAL://localhost:9092"
      KAFKA_INTER_BROKER_LISTENER_NAME: "PLAINTEXT"
      KAFKA_CONTROLLER_LISTENER_NAMES: "CONTROLLER"
      KAFKA_LISTENER_SECURITY_PROTOCOL_MAP: "PLAINTEXT:PLAINTEXT,EXTERNAL:PLAINTEXT,CONTROLLER:PLAINTEXT"
      KAFKA_ALLOW_PLAINTEXT_LISTENER: "yes"
      KAFKA_LOG4J_LOGGERS: "org.apache.kafka=DEBUG"
      KAFKA_JMX_PORT: "9101"
      KAFKA_JMX_HOSTNAME: "broker1"
      KAFKA_OPTS: "-javaagent:/opt/jmx_exporter/jmx_prometheus_javaagent.jar=7071:/opt/jmx_exporter/kafka-config.yml"
    ports:
      - "127.0.0.1:9092:29092"
    depends_on:
      - controller1
      - controller2
      - controller3
    volumes:
      - broker1-data:/var/lib/kafka/data
      - ../metrics/jmx-exporter:/opt/jmx_exporter
    networks:
      - kafka-quorum
      - kafka-data
      - observability
      - edge

  broker2:
    image: confluentinc/cp-kafka:latest
    container_name: broker2
    environment:
      KAFKA_PROCESS_ROLES: "broker"
      KAFKA_NODE_ID: "5"
      KAFKA_CLUSTER_ID: "1490b9b6-15d4-40fc-b963-5ffa822835fd"
      KAFKA_CONTROLLER_QUORUM_VOTERS: "1@controller1:9093,2@controller2:9093,3@controller3:9093"
      KAFKA_LISTENERS: "PLAINTEXT://:9092,EXTERNAL://:29092"
      KAFKA_ADVERTISED_LISTENERS: "PLAINTEXT://broker2:9092,EXTERNAL://localhost:9093"
      KAFKA_LISTENER_SECURITY_PROTOCOL_MAP: "PLAINTEXT:PLAINTEXT,EXTERNAL:PLAINTEXT,CONTROLLER:PLAINTEXT"
      KAFKA_INTER_BROKER_LISTENER_NAME: "PLAINTEXT"
      KAFKA_CONTROLLER_LISTENER_NAMES: "CONTROLLER"
      KAFKA_ALLOW_PLAINTEXT_LISTENER: "yes"
      KAFKA_LOG4J_LOGGERS: "org.apache.kafka=DEBUG"
      KAFKA_JMX_PORT: "9101"
      KAFKA_JMX_HOSTNAME: "broker2"
      KAFKA_OPTS: "-javaagent:/opt/jmx_exporter/jmx_prometheus_javaagent.jar=7071:/opt/jmx_exporter/kafka-config.yml"
    ports:
      - "127.0.0.1:9093:29092"
    depends_on:
      - controller1
      - controller2
      - controller3
    volumes:
      - broker2-data:/var/lib/kafka/data
      - ../metrics/jmx-exporter:/opt/jmx_exporter
    networks:
      - kafka-quorum
      - kafka-data
      - observability
      - edge

  broker3:
    image: confluentinc/cp-kafka:latest
    container_name: broker3
    environment:
      KAFKA_PROCESS_ROLES: "broker"
      KAFKA_NODE_ID: "6"
      KAFKA_CLUSTER_ID: "1490b9b6-15d4-40fc-b963-5ffa822835fd"
      KAFKA_CONTROLLER_QUORUM_VOTERS: "1@controller1:9093,2@controller2:9093,3@controller3:9093"
      KAFKA_LISTENERS: "PLAINTEXT://:9092,EXTERNAL://:29092"
      KAFKA_ADVERTISED_LISTENERS: "PLAINTEXT://broker3:9092,EXTERNAL://localhost:9094"
      KAFKA_LISTENER_SECURITY_PROTOCOL_MAP: "PLAINTEXT:PLAINTEXT,EXTERNAL:PLAINTEXT,CONTROLLER:PLAINTEXT"
      KAFKA_INTER_BROKER_LISTENER_NAME: "PLAINTEXT"
      KAFKA_CONTROLLER_LISTENER_NAMES: "CONTROLLER"
      KAFKA_ALLOW_PLAINTEXT_LISTENER: "yes"
      KAFKA_LOG4J_LOGGERS: "org.apache.kafka=DEBUG"
      KAFKA_JMX_PORT: "9101"
      KAFKA_JMX_HOSTNAME: "broker3"
      KAFKA_OPTS: "-javaagent:/opt/jmx_exporter/jmx_prometheus_javaagent.jar=7071:/opt/jmx_exporter/kafka-config.yml"
    ports:
      - "127.0.0.1:9094:29092"
    depends_on:
      - controller1
      - controller2
      - controller3
    volumes:
      - broker3-data:/var/lib/kafka/data
      - ../metrics/jmx-exporter:/opt/jmx_exporter
    networks:
      - kafka-quorum
      - kafka-data
      - observability
      - edge

  # AKHQ — data (client connectivity to brokers, JMX via container hostnames) + edge (UI on 127.0.0.1).
  # JMX targets now use each broker's internal port 9101 (host-mapped ports removed).
  akhq:
    image: tchiotludo/akhq:latest
    container_name: akhq
    environment:
      AKHQ_CONFIGURATION: |
        akhq:
          connections:
            kafka-kraft-cluster:
              properties:
                bootstrap.servers: "broker1:9092,broker2:9092,broker3:9092"
              jmx:
                - name: broker1
                  url: "broker1:9101"
                - name: broker2
                  url: "broker2:9101"
                - name: broker3
                  url: "broker3:9101"
              connect:
                - name: "kafka-connect"
                  url: "http://kafka-connect:8083"
    ports:
      - "127.0.0.1:8080:8080"
    depends_on:
      - broker1
      - broker2
      - broker3
      - kafka-connect
    networks:
      - kafka-data
      - edge

  # LocalStack — reachable by Connect on kafka-data; host access on 127.0.0.1:4566 for aws CLI/tests.
  # Wide 4510-4559 host range removed (services now consumed only via 4566 gateway).
  # NOTE: docker.sock mount is an accepted lab risk (F6 in 04-SECURITY-GUARDRAILS.md); required for
  # LOCAL Lambda executor. LAMBDA_DOCKER_NETWORK pinned to the deterministic kafka-data name.
  localstack:
    image: localstack/localstack:latest
    container_name: localstack
    environment:
      SERVICES: s3,ssm,secretsmanager,iam,sts,cloudwatch,logs,sns,sqs,lambda,kms,events
      DEBUG: 0
      DATA_DIR: /var/lib/localstack
      HOSTNAME_EXTERNAL: localstack
      AWS_DEFAULT_REGION: us-east-1
      PERSIST_STORAGE: 1
      EAGER_SERVICE_LOADING: 1
      SKIP_SSL_CERT_DOWNLOAD: 1
      LAMBDA_EXECUTOR: docker-reuse
      LAMBDA_DOCKER_NETWORK: kafka-data
      LAMBDA_REMOVE_CONTAINERS: true
      LS_LOG: warn
    ports:
      - "127.0.0.1:4566:4566"
    volumes:
      - localstack-data:/var/lib/localstack
      - ./localstack-init:/etc/localstack/init/ready.d
      - /var/run/docker.sock:/var/run/docker.sock
    tmpfs:
      - /tmp
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:4566/_localstack/health"]
      interval: 10s
      timeout: 5s
      retries: 5
      start_period: 30s
    networks:
      - kafka-data
      - edge

  # Schema Registry — kafka-data only; UI on 127.0.0.1 via edge for developer convenience.
  schema-registry:
    image: confluentinc/cp-schema-registry:latest
    container_name: schema-registry
    environment:
      SCHEMA_REGISTRY_HOST_NAME: schema-registry
      SCHEMA_REGISTRY_KAFKASTORE_BOOTSTRAP_SERVERS: "broker1:9092,broker2:9092,broker3:9092"
      SCHEMA_REGISTRY_LISTENERS: "http://0.0.0.0:8081"
      SCHEMA_REGISTRY_DEBUG: "true"
    ports:
      - "127.0.0.1:8081:8081"
    depends_on:
      - broker1
      - broker2
      - broker3
    networks:
      - kafka-data
      - edge

  # Kafka Connect — kafka-data (brokers + localstack S3) + edge (REST 127.0.0.1:8083).
  kafka-connect:
    image: confluentinc/cp-kafka-connect:latest
    container_name: kafka-connect
    environment:
      CONNECT_BOOTSTRAP_SERVERS: "broker1:9092,broker2:9092,broker3:9092"
      CONNECT_REST_PORT: 8083
      CONNECT_REST_ADVERTISED_HOST_NAME: "kafka-connect"
      CONNECT_GROUP_ID: "kafka-connect-cluster"
      CONNECT_CONFIG_STORAGE_TOPIC: "_connect-configs"
      CONNECT_CONFIG_STORAGE_REPLICATION_FACTOR: 3
      CONNECT_OFFSET_STORAGE_TOPIC: "_connect-offsets"
      CONNECT_OFFSET_STORAGE_REPLICATION_FACTOR: 3
      CONNECT_STATUS_STORAGE_TOPIC: "_connect-status"
      CONNECT_STATUS_STORAGE_REPLICATION_FACTOR: 3
      CONNECT_KEY_CONVERTER: "org.apache.kafka.connect.json.JsonConverter"
      CONNECT_VALUE_CONVERTER: "org.apache.kafka.connect.json.JsonConverter"
      CONNECT_KEY_CONVERTER_SCHEMAS_ENABLE: "false"
      CONNECT_VALUE_CONVERTER_SCHEMAS_ENABLE: "false"
      CONNECT_PLUGIN_PATH: "/usr/share/java,/usr/share/confluent-hub-components"
      CONNECT_LOG4J_LOGGERS: "org.apache.kafka.connect=INFO"
      AWS_ACCESS_KEY_ID: "test"
      AWS_SECRET_ACCESS_KEY: "test"
      AWS_DEFAULT_REGION: "us-east-1"
    ports:
      - "127.0.0.1:8083:8083"
    depends_on:
      localstack:
        condition: service_healthy
      broker1:
        condition: service_started
      broker2:
        condition: service_started
      broker3:
        condition: service_started
      schema-registry:
        condition: service_started
    command:
      - bash
      - -c
      - |
        echo "Installing S3 Sink Connector..."
        confluent-hub install --no-prompt confluentinc/kafka-connect-s3:10.5.0
        echo "Launching Kafka Connect..."
        /etc/confluent/docker/run
    networks:
      - kafka-data
      - edge

  # Prometheus — observability (scrape targets) + edge (UI 127.0.0.1:9090).
  prometheus:
    image: prom/prometheus:latest
    container_name: prometheus
    command:
      - '--config.file=/etc/prometheus/prometheus.yml'
      - '--storage.tsdb.path=/prometheus'
      - '--web.console.libraries=/usr/share/prometheus/console_libraries'
      - '--web.console.templates=/usr/share/prometheus/consoles'
    ports:
      - "127.0.0.1:9090:9090"
    volumes:
      - ../metrics/prometheus.yml:/etc/prometheus/prometheus.yml
      - prometheus-data:/prometheus
    depends_on:
      - broker1
      - broker2
      - broker3
    networks:
      - observability
      - edge

  # Grafana — observability (reach Prometheus) + edge (UI 127.0.0.1:3000).
  grafana:
    image: grafana/grafana:latest
    container_name: grafana
    environment:
      GF_SECURITY_ADMIN_USER: admin
      GF_SECURITY_ADMIN_PASSWORD: admin
      GF_INSTALL_PLUGINS: "grafana-clock-panel,grafana-simple-json-datasource"
    ports:
      - "127.0.0.1:3000:3000"
    volumes:
      - grafana-data:/var/lib/grafana
      - ../metrics/grafana/dashboards:/etc/grafana/provisioning/dashboards
      - ../metrics/grafana/datasources:/etc/grafana/provisioning/datasources
    depends_on:
      - prometheus
    networks:
      - observability
      - edge

networks:
  kafka-quorum:
    name: kafka-quorum
    driver: bridge
    internal: true
  kafka-data:
    name: kafka-data
    driver: bridge
    internal: true
  observability:
    name: observability
    driver: bridge
    internal: true
  edge:
    name: edge
    driver: bridge

volumes:
  controller1-data:
  controller2-data:
  controller3-data:
  broker1-data:
  broker2-data:
  broker3-data:
  prometheus-data:
  grafana-data:
  localstack-data:
