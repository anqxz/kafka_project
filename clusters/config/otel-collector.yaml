receivers:
  otlp:
    protocols:
      grpc:
        endpoint: 0.0.0.0:4317
      http:
        endpoint: 0.0.0.0:4318
  filelog:
    include:
      - /var/lib/docker/containers/*/*.log
    include_file_path: true
    operators:
      - type: json_parser
        timestamp:
          parse_from: attributes.time
          layout: '%Y-%m-%dT%H:%M:%S.%LZ'

processors:
  batch:
    send_batch_size: 1000
    timeout: 10s
  attributes:
    actions:
      - key: password
        action: delete
      - key: secret
        action: delete
      - key: token
        action: delete
      - key: apikey
        action: delete
  # Redact sensitive attribute keys via regex using transform processor
  transform:
    log_statements:
      - context: log
        statements:
          - delete_key(attributes, "password") where IsMatch(attributes["password"], ".*")
          - delete_key(attributes, "secret") where IsMatch(attributes["secret"], ".*")
          - delete_key(attributes, "token") where IsMatch(attributes["token"], ".*")
          - delete_key(attributes, "apikey") where IsMatch(attributes["apikey"], ".*")

exporters:
  loki:
    endpoint: http://loki:3100/loki/api/v1/push
    default_labels_enabled:
      exporter: true
      job: true
  otlp/tempo:
    endpoint: http://tempo:4317
    tls:
      insecure: true
  prometheus:
    endpoint: 0.0.0.0:8889
    namespace: otelcol

service:
  pipelines:
    logs:
      receivers: [filelog, otlp]
      processors: [batch, transform]
      exporters: [loki]
    traces:
      receivers: [otlp]
      processors: [batch]
      exporters: [otlp/tempo]
    metrics:
      receivers: [otlp]
      processors: [batch]
      exporters: [prometheus]
