---
# PR 5 — JMX sidecar config for broker1.
# The standalone jmx-exporter connects to broker1:9101 over JMX RMI (shared kafka-data network)
# and exposes /metrics on :5556 for Prometheus to scrape (observability network).
hostPort: broker1:9101
username:
password:

ssl: false

rules:
  # ReplicaManager — partition count, leader count, under-replicated, ISR shrinks/expansions
  - pattern: "kafka.server<type=ReplicaManager, name=(.+)><>Value"
    name: "kafka_server_replicamanager_$1"
    type: GAUGE
    labels:
      service: kafka-broker

  - pattern: "kafka.server<type=ReplicaManager, name=(.+)><>Count"
    name: "kafka_server_replicamanager_$1_total"
    type: COUNTER
    labels:
      service: kafka-broker

  # BrokerTopicMetrics — bytes in/out, messages in, fetch/produce request rates
  - pattern: "kafka.server<type=BrokerTopicMetrics, name=(.+)><>Count"
    name: "kafka_server_brokertopicmetrics_$1_total"
    type: COUNTER
    labels:
      service: kafka-broker

  - pattern: "kafka.server<type=BrokerTopicMetrics, name=(.+), topic=(.+)><>Count"
    name: "kafka_server_brokertopicmetrics_$1_total"
    type: COUNTER
    labels:
      service: kafka-broker
      topic: "$2"

  # Network — request queue size, response queue size
  - pattern: "kafka.network<type=RequestMetrics, name=(.+), request=(.+)><>Count"
    name: "kafka_network_requestmetrics_$1_total"
    type: COUNTER
    labels:
      service: kafka-broker
      request: "$2"

  - pattern: "kafka.network<type=RequestMetrics, name=(.+), request=(.+)><>(\d+)thPercentile"
    name: "kafka_network_requestmetrics_$1_percentile"
    type: GAUGE
    labels:
      service: kafka-broker
      request: "$2"
      quantile: "0.$3"

  # Purgatory — delayed fetch/produce
  - pattern: "kafka.server<type=DelayedOperationPurgatory, name=(.+), delayedOperation=(.+)><>Value"
    name: "kafka_server_delayedoperationpurgatory_$1"
    type: GAUGE
    labels:
      service: kafka-broker
      delayed_operation: "$2"

  # Log size
  - pattern: "kafka.log<type=LogManager, name=(.+)><>Value"
    name: "kafka_log_logmanager_$1"
    type: GAUGE
    labels:
      service: kafka-broker

  # Controller — active controller count, offline partitions, leader elections
  - pattern: "kafka.controller<type=KafkaController, name=(.+)><>Value"
    name: "kafka_controller_kafkacontroller_$1"
    type: GAUGE
    labels:
      service: kafka-broker

  # Catch-all — anything not matched above
  - pattern: "kafka.(\\w+)<type=(.+), name=(.+)><>Value"
    name: "kafka_$1_$2_$3"
    type: GAUGE
    labels:
      service: kafka-broker

  - pattern: "kafka.(\\w+)<type=(.+), name=(.+)><>Count"
    name: "kafka_$1_$2_$3_total"
    type: COUNTER
    labels:
      service: kafka-broker
