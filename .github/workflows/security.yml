name: security

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]
  workflow_dispatch:
  schedule:
    - cron: "0 6 * * 1"   # weekly Monday sweep

concurrency:
  group: security-${{ github.ref }}
  cancel-in-progress: true

jobs:

  image-scan:
    name: Trivy scan (services/*)
    runs-on: ubuntu-latest
    permissions:
      contents: read
      security-events: write
    strategy:
      fail-fast: false
      matrix:
        include:
          # Services whose CVEs come from OUR code + OUR base pick
          # (Python 3.13-slim, alpine). Trivy failure blocks the merge.
          - { service: mcp-kafka,         blocking: true  }
          - { service: loadgen,           blocking: true  }
          - { service: kminion,           blocking: true  }
          # Confluent CP lineage (broker / controller / kafka-connect /
          # schema-registry / cruise-control). We layer `microdnf update`
          # so OS deltas from UBI8 are patched, but the JVM + Kafka jars
          # + Connect libs are Confluent's to fix. Findings still upload
          # as SARIF for tracking; job soft-fails so a fresh upstream
          # CVE doesn't block an unrelated merge.
          - { service: broker,            blocking: false }
          - { service: controller,        blocking: false }
          - { service: kafka-connect,     blocking: false }
          - { service: schema-registry,   blocking: false }
          - { service: cruise-control,    blocking: false }
          # Vendor images we consume as-is — upstream's CVEs.
          - { service: kroxylicious,      blocking: false }
          - { service: toxiproxy,         blocking: false }
          - { service: grafana,           blocking: false }
          - { service: prometheus,        blocking: false }
          - { service: loki,              blocking: false }
          - { service: tempo,             blocking: false }
          - { service: pyroscope,         blocking: false }
          - { service: alertmanager,      blocking: false }
          - { service: blackbox-exporter, blocking: false }
          - { service: otel-collector,    blocking: false }
          - { service: ntfy,              blocking: false }
          - { service: localstack,        blocking: false }
          - { service: akhq,              blocking: false }
    steps:
      - uses: actions/checkout@v7
      - name: Build image
        run: docker build -t "kproj-${{ matrix.service }}:ci" "services/${{ matrix.service }}"
      - name: Trivy — CRITICAL/HIGH
        uses: aquasecurity/trivy-action@master
        continue-on-error: ${{ !matrix.blocking }}
        with:
          image-ref: "kproj-${{ matrix.service }}:ci"
          format: sarif
          output: "trivy-${{ matrix.service }}.sarif"
          exit-code: 1
          ignore-unfixed: true
          severity: "CRITICAL,HIGH"
          # Per-service risk-accept file. Absent → nothing suppressed.
          # Expiry dates inside the file are on us to honour; Trivy does
          # not enforce them.
          trivyignores: "services/${{ matrix.service }}/.trivyignore"
      - name: Upload SARIF
        if: always()
        uses: github/codeql-action/upload-sarif@v4
        with:
          sarif_file: "trivy-${{ matrix.service }}.sarif"
          category: "trivy/${{ matrix.service }}"

  sbom:
    name: SBOM (Syft) per image
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      matrix:
        service:
          - broker
          - controller
          - kafka-connect
          - schema-registry
          - cruise-control
          - mcp-kafka
          - loadgen
    steps:
      - uses: actions/checkout@v7
      - name: Build image
        run: docker build -t "kproj-${{ matrix.service }}:ci" "services/${{ matrix.service }}"
      - uses: anchore/sbom-action@v0
        with:
          image: "kproj-${{ matrix.service }}:ci"
          format: cyclonedx-json
          artifact-name: "sbom-${{ matrix.service }}.cdx.json"

  secrets-scan:
    name: Gitleaks
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v7
        with:
          fetch-depth: 0
      - uses: gitleaks/gitleaks-action@v3
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}

  compose-lint:
    name: Compose config lint
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v7
      - run: docker compose -f clusters/docker-compose.yml --env-file clusters/.env config -q

  image-digest-drift:
    name: Image digest drift (compose)
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v7
      - name: Resolve compose to pinned digests
        run: |
          # Non-fatal: emits any float tag as a warning so a Renovate PR
          # can pin it. Failing here would block every base-image bump.
          # `docker compose config --resolve-image-digests` will error on
          # locally-built images that carry an `image:` tag (e.g.
          # kafka-lab/step-ca:local) because they're not on any registry.
          # List the images first, filter out local-only tags, then
          # inspect each remaining reference. Whole step is || true so a
          # transient registry failure never blocks a merge.
          set +e
          docker compose -f clusters/docker-compose.yml --env-file clusters/.env \
            config --images \
          | grep -v '^kafka-lab/' \
          > /tmp/remote-images.txt
          floating=0
          while read -r img; do
            [ -z "$img" ] && continue
            case "$img" in
              *@sha256:*) ;;                                   # already pinned
              *) echo "::warning::floating image reference: $img"; floating=1 ;;
            esac
          done < /tmp/remote-images.txt
          if [ "$floating" = 1 ]; then
            echo "::warning::Renovate should pin the images listed above"
          fi
          exit 0
