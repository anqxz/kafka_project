receivers:
  otlp:
    protocols:
      grpc:
        endpoint: 0.0.0.0:4317
        tls:
          cert_file: /certs/pem/otel-collector/tls.crt
          key_file: /certs/pem/otel-collector/tls.key
      http:
        endpoint: 0.0.0.0:4318
        tls:
          cert_file: /certs/pem/otel-collector/tls.crt
          key_file: /certs/pem/otel-collector/tls.key
  # filelog disabled: rootless Docker/Podman doesn't expose /var/lib/docker/containers.
  # Enable in a later PR using a rootless-compatible log source (docker events / OTLP push from apps).

processors:
  batch:
    send_batch_size: 1000
    timeout: 10s
  attributes:
    actions:
      - key: password
        action: delete
      - key: secret
        action: delete
      - key: token
        action: delete
      - key: apikey
        action: delete
  # Redact sensitive attribute keys via regex using transform processor
  transform:
    log_statements:
      - context: log
        statements:
          - delete_key(attributes, "password") where IsMatch(attributes["password"], ".*")
          - delete_key(attributes, "secret") where IsMatch(attributes["secret"], ".*")
          - delete_key(attributes, "token") where IsMatch(attributes["token"], ".*")
          - delete_key(attributes, "apikey") where IsMatch(attributes["apikey"], ".*")

exporters:
  otlphttp/loki:
    endpoint: https://loki:3100/otlp
    tls:
      ca_file: /certs/ca/ca-bundle.pem
  otlphttp/tempo:
    endpoint: https://tempo:4318
    tls:
      ca_file: /certs/ca/ca-bundle.pem
  prometheus:
    endpoint: 0.0.0.0:8889
    namespace: otelcol
    tls:
      cert_file: /certs/pem/otel-collector/tls.crt
      key_file: /certs/pem/otel-collector/tls.key

service:
  telemetry:
    metrics:
      level: detailed
      readers:
        - pull:
            exporter:
              prometheus:
                host: '0.0.0.0'
                port: 8888
                # Prometheus receiver in service.telemetry doesn't
                # accept a tls: block in the collector 0.156 schema —
                # only host/port/without_scope_info/without_type_suffix
                # /without_units. Left plaintext; scrape it via the
                # blackbox probe if we need transport encryption later.
  pipelines:
    logs:
      receivers: [otlp]
      processors: [batch, transform]
      exporters: [otlphttp/loki]
    traces:
      receivers: [otlp]
      processors: [batch]
      exporters: [otlphttp/tempo]
    metrics:
      receivers: [otlp]
      processors: [batch]
      exporters: [prometheus]
