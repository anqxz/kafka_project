receivers:
  otlp:
    protocols:
      grpc:
        endpoint: 0.0.0.0:4317
        tls:
          cert_file: /etc/tls/otel-collector.pem
          key_file: /etc/tls/otel-collector.key
      http:
        endpoint: 0.0.0.0:4318
        tls:
          cert_file: /etc/tls/otel-collector.pem
          key_file: /etc/tls/otel-collector.key
  # filelog disabled: rootless Docker/Podman doesn't expose /var/lib/docker/containers.
  # Enable in a later PR using a rootless-compatible log source (docker events / OTLP push from apps).

processors:
  batch:
    send_batch_size: 1000
    timeout: 10s
  attributes:
    actions:
      - key: password
        action: delete
      - key: secret
        action: delete
      - key: token
        action: delete
      - key: apikey
        action: delete
  # Redact sensitive attribute keys via regex using transform processor
  transform:
    log_statements:
      - context: log
        statements:
          - delete_key(attributes, "password") where IsMatch(attributes["password"], ".*")
          - delete_key(attributes, "secret") where IsMatch(attributes["secret"], ".*")
          - delete_key(attributes, "token") where IsMatch(attributes["token"], ".*")
          - delete_key(attributes, "apikey") where IsMatch(attributes["apikey"], ".*")

exporters:
  otlphttp/loki:
    endpoint: http://loki:3100/otlp
    tls:
      insecure: true
  otlp/tempo:
    endpoint: http://tempo:4317
    tls:
      insecure: true
  prometheus:
    endpoint: 0.0.0.0:8889
    namespace: otelcol

service:
  telemetry:
    metrics:
      # Expose the collector's own pipeline counters (otelcol_receiver_*,
      # otelcol_processor_*, otelcol_exporter_*) on :8888 so Prometheus
      # can scrape them.
      address: 0.0.0.0:8888
  pipelines:
    logs:
      receivers: [otlp]
      processors: [batch, transform]
      exporters: [otlphttp/loki]
    traces:
      receivers: [otlp]
      processors: [batch]
      exporters: [otlp/tempo]
    metrics:
      receivers: [otlp]
      processors: [batch]
      exporters: [prometheus]
