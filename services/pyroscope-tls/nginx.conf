# TLS-terminating reverse proxy in front of Pyroscope 1.7.1 — the
# backend's `server.http_tls_config` is silently ignored in single-
# binary mode, so this sidecar takes the query-path TLS surface.
# Ingest agents (broker/controller/etc pyroscope-java) keep pushing
# plaintext directly to pyroscope:4040; only the query path (Grafana,
# Prometheus scrape, blackbox probe) is upgraded.

server {
    listen 4041 ssl;
    server_name pyroscope-tls;

    ssl_certificate     /certs/pem/pyroscope-tls/tls.crt;
    ssl_certificate_key /certs/pem/pyroscope-tls/tls.key;
    ssl_protocols       TLSv1.2 TLSv1.3;

    location / {
        proxy_pass         http://pyroscope:4040;
        proxy_http_version 1.1;
        proxy_set_header   Host              $host;
        proxy_set_header   X-Real-IP         $remote_addr;
        proxy_set_header   X-Forwarded-For   $proxy_add_x_forwarded_for;
        proxy_set_header   X-Forwarded-Proto https;
    }
}
