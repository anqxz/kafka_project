# TLS-terminating reverse proxy in front of Kroxylicious's adminHttp.
# Kroxylicious 0.10 AdminHttpConfiguration has no TLS knobs (only host,
# port, endpoints), so this sidecar exposes /metrics + /health over
# HTTPS for Prometheus + probing while the proxy's admin socket stays
# on the internal observability network.

server {
    listen 9191 ssl;
    server_name kroxylicious-admin-tls;

    ssl_certificate     /certs/pem/kroxylicious-admin-tls/tls.crt;
    ssl_certificate_key /certs/pem/kroxylicious-admin-tls/tls.key;
    ssl_protocols       TLSv1.2 TLSv1.3;

    location / {
        proxy_pass         http://kroxylicious:9190;
        proxy_http_version 1.1;
        proxy_set_header   Host              $host;
        proxy_set_header   X-Real-IP         $remote_addr;
        proxy_set_header   X-Forwarded-For   $proxy_add_x_forwarded_for;
        proxy_set_header   X-Forwarded-Proto https;
    }
}
