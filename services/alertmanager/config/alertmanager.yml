global:
  resolve_timeout: 5m

route:
  group_by: ['cluster', 'alertname']
  group_wait: 30s
  group_interval: 5m
  repeat_interval: 12h
  receiver: ntfy-kafka
  routes:
    # Deadman heartbeat — separate topic, aggressive repeat so absence
    # is quickly noticeable. If ntfy stops seeing this every ~2m, the
    # alerting pipeline itself is broken.
    - matchers:
        - alertname = "Watchdog"
      receiver: ntfy-watchdog
      group_wait: 0s
      group_interval: 2m
      repeat_interval: 2m

receivers:
  - name: ntfy-kafka
    webhook_configs:
      - url: 'http://ntfy/kafka-alerts-c3f8a2d1'
        send_resolved: true
        http_config:
          follow_redirects: true

  - name: ntfy-watchdog
    webhook_configs:
      - url: 'http://ntfy/kafka-watchdog-c3f8a2d1'
        send_resolved: false
        http_config:
          follow_redirects: true

inhibit_rules:
  - source_matchers:
      - severity="critical"
    target_matchers:
      - severity="warning"
    equal: ['cluster', 'alertname']
