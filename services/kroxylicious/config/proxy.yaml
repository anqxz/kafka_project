# Minimal Kroxylicious 0.10.0 config: pass-through proxy on :9192 to the
# internal broker cluster. Filter chain (RecordEncryption via LocalStack
# KMS) will be added once the target-cluster + broker discovery flow is
# validated end-to-end.
adminHttp:
  endpoints:
    prometheus: {}

virtualClusters:
  kafka-kraft-cluster:
    targetCluster:
      bootstrapServers: broker1:9092,broker2:9092,broker3:9092
    clusterNetworkAddressConfigProvider:
      type: PortPerBrokerClusterNetworkAddressConfigProvider
      config:
        bootstrapAddress: 0.0.0.0:9192
    logNetwork: false
    logFrames: false

filterDefinitions: []
