# Minimal Kroxylicious 0.10.0 config: pass-through proxy on :9192 to the
# internal broker cluster. RecordEncryption filter chain is deferred until
# the schema is validated against the actual runtime.
adminHttp:
  endpoints:
    prometheus: {}

virtualClusters:
  - name: kafka-kraft-cluster
    targetCluster:
      bootstrapServers: broker1:9092,broker2:9092,broker3:9092
    clusterNetworkAddressConfigProvider:
      type: PortPerBrokerClusterNetworkAddressConfigProvider
      config:
        bootstrapAddress: 0.0.0.0:9192
