// Kafka requires a global KafkaServer JAAS entry whenever any listener
// enables SASL, even if inter-broker traffic stays on PLAINTEXT. The
// admin credential is baked into metadata by bootstrap-scram-users.sh
// (or by kafka-storage --add-scram on the inter-broker cut-over path)
// so the password only ever lives inside the container's env for the
// duration of startup.
//
// 04-SECURITY-GUARDRAILS §2 phase 2.

KafkaServer {
  org.apache.kafka.common.security.scram.ScramLoginModule required
  username="admin"
  password="__SCRAM_ADMIN_PASSWORD__";
};
