# TLS-terminating reverse proxy in front of kminion's /metrics port.
# kminion 2.3.3 uses net/http ListenAndServe without a TLS mode, so we
# terminate here. Prometheus scrapes the sidecar; nothing else talks
# to kminion.

server {
    listen 8081 ssl;
    server_name kminion-tls;

    ssl_certificate     /certs/pem/kminion-tls/tls.crt;
    ssl_certificate_key /certs/pem/kminion-tls/tls.key;
    ssl_protocols       TLSv1.2 TLSv1.3;

    location / {
        proxy_pass         http://kminion:8080;
        proxy_http_version 1.1;
        proxy_set_header   Host              $host;
        proxy_set_header   X-Real-IP         $remote_addr;
        proxy_set_header   X-Forwarded-For   $proxy_add_x_forwarded_for;
        proxy_set_header   X-Forwarded-Proto https;
    }
}
