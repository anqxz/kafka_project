# Cruise Control configuration — Phase 5 (mTLS end-to-end).
# Analyzer's Kafka client and the metric sampler both use the same
# per-service leaf cert issued by the lab CA. Principal = User:cruise-control.
bootstrap.servers=broker1:9096,broker2:9096,broker3:9096
security.protocol=SSL
ssl.truststore.location=/certs/jks/cruise-control/truststore.p12
ssl.truststore.type=PKCS12
ssl.truststore.password=changeit-dev-only
ssl.keystore.location=/certs/jks/cruise-control/keystore.p12
ssl.keystore.type=PKCS12
ssl.keystore.password=changeit-dev-only
ssl.key.password=changeit-dev-only
ssl.endpoint.identification.algorithm=https
# KRaft cluster — no ZooKeeper.
kafka.broker.failure.detection.enable=true

# Basic-auth on the REST endpoint (04-SECURITY §F10).
webserver.security.enable=true
webserver.auth.credentials.file=/opt/cruise-control/config/auth.properties
webserver.security.provider=com.linkedin.kafka.cruisecontrol.servlet.security.BasicSecurityProvider

# Metric sampling
metric.sampler.class=com.linkedin.kafka.cruisecontrol.monitor.sampling.CruiseControlMetricsReporterSampler
cruise.control.metrics.reporter.bootstrap.servers=broker1:9096,broker2:9096,broker3:9096
cruise.control.metrics.reporter.security.protocol=SSL
cruise.control.metrics.reporter.ssl.truststore.location=/certs/jks/cruise-control/truststore.p12
cruise.control.metrics.reporter.ssl.truststore.type=PKCS12
cruise.control.metrics.reporter.ssl.truststore.password=changeit-dev-only
cruise.control.metrics.reporter.ssl.keystore.location=/certs/jks/cruise-control/keystore.p12
cruise.control.metrics.reporter.ssl.keystore.type=PKCS12
cruise.control.metrics.reporter.ssl.keystore.password=changeit-dev-only
cruise.control.metrics.reporter.ssl.key.password=changeit-dev-only
cruise.control.metrics.reporter.ssl.endpoint.identification.algorithm=https

# KafkaSampleStore requires these two topics.
partition.metric.sample.store.topic=__KafkaCruiseControlPartitionMetricSamples
broker.metric.sample.store.topic=__KafkaCruiseControlModelTrainingSamples
cruise.control.metrics.topic=__CruiseControlMetrics
cruise.control.metrics.topic.auto.create=true
cruise.control.metrics.topic.num.partitions=1
cruise.control.metrics.topic.replication.factor=1
metric.sampling.interval.ms=60000
partition.metrics.window.ms=300000
num.partition.metrics.windows=5
min.samples.per.partition.metrics.window=1
broker.metrics.window.ms=300000
num.broker.metrics.windows=20
min.samples.per.broker.metrics.window=1

# Goals
hard.goals=\
  com.linkedin.kafka.cruisecontrol.analyzer.goals.ReplicaCapacityGoal,\
  com.linkedin.kafka.cruisecontrol.analyzer.goals.DiskCapacityGoal,\
  com.linkedin.kafka.cruisecontrol.analyzer.goals.NetworkInboundCapacityGoal,\
  com.linkedin.kafka.cruisecontrol.analyzer.goals.NetworkOutboundCapacityGoal,\
  com.linkedin.kafka.cruisecontrol.analyzer.goals.CpuCapacityGoal

default.goals=\
  com.linkedin.kafka.cruisecontrol.analyzer.goals.ReplicaCapacityGoal,\
  com.linkedin.kafka.cruisecontrol.analyzer.goals.DiskCapacityGoal,\
  com.linkedin.kafka.cruisecontrol.analyzer.goals.NetworkInboundCapacityGoal,\
  com.linkedin.kafka.cruisecontrol.analyzer.goals.NetworkOutboundCapacityGoal,\
  com.linkedin.kafka.cruisecontrol.analyzer.goals.CpuCapacityGoal,\
  com.linkedin.kafka.cruisecontrol.analyzer.goals.ReplicaDistributionGoal,\
  com.linkedin.kafka.cruisecontrol.analyzer.goals.PotentialNwOutGoal,\
  com.linkedin.kafka.cruisecontrol.analyzer.goals.DiskUsageDistributionGoal,\
  com.linkedin.kafka.cruisecontrol.analyzer.goals.NetworkInboundUsageDistributionGoal,\
  com.linkedin.kafka.cruisecontrol.analyzer.goals.NetworkOutboundUsageDistributionGoal,\
  com.linkedin.kafka.cruisecontrol.analyzer.goals.CpuUsageDistributionGoal,\
  com.linkedin.kafka.cruisecontrol.analyzer.goals.TopicReplicaDistributionGoal,\
  com.linkedin.kafka.cruisecontrol.analyzer.goals.LeaderReplicaDistributionGoal,\
  com.linkedin.kafka.cruisecontrol.analyzer.goals.LeaderBytesInDistributionGoal

# Webserver — basic auth is configured earlier in this file.
webserver.http.port=9090
webserver.http.address=0.0.0.0
webserver.ssl.enable=true
webserver.ssl.keystore.location=/certs/jks/cruise-control/keystore.p12
webserver.ssl.keystore.password=changeit-dev-only
webserver.ssl.keystore.type=PKCS12
webserver.ssl.key.password=changeit-dev-only
webserver.ssl.protocol=TLSv1.2
webserver.api.urlprefix=/kafkacruisecontrol/*
webserver.ui.diskpath=./cruise-control-ui/dist
webserver.ui.urlprefix=/*

# Capacity config
capacity.config.file=config/capacity.json
broker.cpu.util.threshold=0.8
broker.disk.util.threshold=0.8
broker.network.in.util.threshold=0.8
broker.network.out.util.threshold=0.8
cpu.balance.threshold=1.1
disk.balance.threshold=1.1
network.inbound.balance.threshold=1.1
network.outbound.balance.threshold=1.1

# Anomaly detection (disabled for Phase 1 — self-healing off)
anomaly.detection.enable=false
