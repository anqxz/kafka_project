# Prometheus configuration file
global:
  scrape_interval: 15s
  evaluation_interval: 15s
  external_labels:
    monitor: 'kafka-monitor'

# Alerting — Alertmanager over HTTPS with lab CA
alerting:
  alertmanagers:
    - scheme: https
      tls_config:
        ca_file: /certs/ca/ca-bundle.pem
      static_configs:
        - targets:
            - alertmanager:9093

rule_files:
  - /etc/prometheus/rules/kafka.rules.yml

scrape_configs:
  # Prometheus self — HTTPS with lab CA
  - job_name: 'prometheus'
    scheme: https
    tls_config:
      ca_file: /certs/ca/ca-bundle.pem
    static_configs:
      - targets: ['prometheus:9090']

  # Kafka Controllers — JMX Exporter over HTTPS (per-controller leaf)
  - job_name: 'kafka-controllers'
    scheme: https
    tls_config:
      ca_file: /certs/ca/ca-bundle.pem
    static_configs:
      - targets:
          - 'controller1:7071'
          - 'controller2:7071'
          - 'controller3:7071'
        labels:
          env: 'development'
          cluster: 'kafka-kraft-cluster'
          role: 'controller'

  # Kafka Brokers — JMX Exporter over HTTPS (per-broker leaf cert)
  - job_name: 'kafka-brokers'
    scheme: https
    tls_config:
      ca_file: /certs/ca/ca-bundle.pem
    static_configs:
      - targets:
          - 'broker1:7071'
          - 'broker2:7071'
          - 'broker3:7071'
        labels:
          env: 'development'
          cluster: 'kafka-kraft-cluster'
          role: 'broker'

  # Schema Registry — JMX Exporter over HTTPS
  - job_name: 'schema-registry'
    scheme: https
    tls_config:
      ca_file: /certs/ca/ca-bundle.pem
    static_configs:
      - targets: ['schema-registry:7071']
        labels:
          env: 'development'
          cluster: 'kafka-kraft-cluster'

  # Kafka Connect — JMX Exporter over HTTPS
  - job_name: 'kafka-connect'
    scheme: https
    tls_config:
      ca_file: /certs/ca/ca-bundle.pem
    static_configs:
      - targets: ['kafka-connect:7071']
        labels:
          env: 'development'
          cluster: 'kafka-kraft-cluster'

  # Kroxylicious — admin metrics via the TLS sidecar (kroxylicious:9190
  # is plaintext-only; AdminHttpConfiguration has no TLS knobs).
  - job_name: 'kroxylicious'
    scheme: https
    tls_config:
      ca_file: /certs/ca/ca-bundle.pem
    metrics_path: /metrics
    static_configs:
      - targets: ['kroxylicious-admin-tls:9191']
        labels:
          env: 'development'
          cluster: 'kafka-kraft-cluster'

  # KMinion — HTTPS via nginx sidecar (kminion 2.3.3 has no native TLS).
  - job_name: 'kminion'
    scheme: https
    tls_config:
      ca_file: /certs/ca/ca-bundle.pem
    static_configs:
      - targets: ['kminion-tls:8081']
        labels:
          env: 'development'
          cluster: 'kafka-kraft-cluster'

  # otel-collector prometheus exporter (:8889) now HTTPS. Self-
  # telemetry (:8888) stays plaintext — collector 0.156's
  # service.telemetry.metrics prometheus reader has no TLS knob.
  - job_name: 'otel-collector'
    static_configs:
      - targets: ['otel-collector:8888']
        labels:
          env: 'development'
          endpoint: 'self'
  - job_name: 'otel-collector-exporter'
    scheme: https
    tls_config:
      ca_file: /certs/ca/ca-bundle.pem
    static_configs:
      - targets: ['otel-collector:8889']
        labels:
          env: 'development'
          endpoint: 'exporter'

  # Alertmanager self-metrics — HTTPS
  - job_name: 'alertmanager'
    scheme: https
    tls_config:
      ca_file: /certs/ca/ca-bundle.pem
    static_configs:
      - targets: ['alertmanager:9093']
        labels:
          env: 'development'

  # Blackbox Exporter self-metrics — HTTPS
  - job_name: 'blackbox-exporter'
    scheme: https
    tls_config:
      ca_file: /certs/ca/ca-bundle.pem
    static_configs:
      - targets: ['blackbox-exporter:9115']
        labels:
          env: 'development'

  # Blackbox probes — target scheme matches each backend; scrape the
  # exporter itself over HTTPS.
  - job_name: 'blackbox-http'
    scheme: https
    tls_config:
      ca_file: /certs/ca/ca-bundle.pem
    metrics_path: /probe
    params:
      module: [http_2xx]
    static_configs:
      - targets:
          - 'https://kafka-connect:8083/'
          - 'https://prometheus:9090/-/ready'
          - 'https://alertmanager:9093/-/ready'
          - 'https://loki:3100/ready'
          - 'https://tempo:3200/ready'
          - 'https://pyroscope-tls:4041/ready'
          - 'https://grafana:3000/api/health'
    relabel_configs:
      - source_labels: [__address__]
        target_label: __param_target
      - source_labels: [__param_target]
        target_label: instance
      - target_label: __address__
        replacement: blackbox-exporter:9115

  # Loki self-metrics — HTTPS
  - job_name: 'loki'
    scheme: https
    tls_config:
      ca_file: /certs/ca/ca-bundle.pem
    metrics_path: /metrics
    static_configs:
      - targets: ['loki:3100']
        labels:
          env: 'development'

  # Tempo self-metrics — HTTPS
  - job_name: 'tempo'
    scheme: https
    tls_config:
      ca_file: /certs/ca/ca-bundle.pem
    metrics_path: /metrics
    static_configs:
      - targets: ['tempo:3200']
        labels:
          env: 'development'

  # Pyroscope self-metrics — HTTPS via nginx sidecar (pyroscope:4040 →
  # pyroscope-tls:4041). Pyroscope 1.7.1 ignores http_tls_config.
  - job_name: 'pyroscope'
    scheme: https
    tls_config:
      ca_file: /certs/ca/ca-bundle.pem
    metrics_path: /metrics
    static_configs:
      - targets: ['pyroscope-tls:4041']
        labels:
          env: 'development'
