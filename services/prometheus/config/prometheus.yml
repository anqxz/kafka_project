# Prometheus configuration file
global:
  scrape_interval: 15s # Set the scrape interval to every 15 seconds
  evaluation_interval: 15s # Evaluate rules every 15 seconds

  external_labels:
    monitor: 'kafka-monitor'

# Alerting — route to Alertmanager inside observability network
alerting:
  alertmanagers:
    - static_configs:
        - targets:
            - alertmanager:9093

# Rule files
rule_files:
  - /etc/prometheus/rules/kafka.rules.yml

# Scrape configurations
scrape_configs:
  # Prometheus self-monitoring
  - job_name: 'prometheus'
    static_configs:
      - targets: ['localhost:9090']

  # Kafka Controllers - JMX Exporter metrics
  - job_name: 'kafka-controllers'
    static_configs:
      - targets:
          - 'controller1:7071'
          - 'controller2:7071'
          - 'controller3:7071'
        labels:
          env: 'development'
          cluster: 'kafka-kraft-cluster'
          role: 'controller'

  # Kafka Brokers - JMX Exporter metrics
  - job_name: 'kafka-brokers'
    static_configs:
      - targets:
          - 'broker1:7071'
          - 'broker2:7071'
          - 'broker3:7071'
        labels:
          env: 'development'
          cluster: 'kafka-kraft-cluster'
          role: 'broker'

  # KMinion — Kafka consumer lag and topic metrics
  - job_name: 'kminion'
    static_configs:
      - targets: ['kminion:8080']
        labels:
          env: 'development'
          cluster: 'kafka-kraft-cluster'

  # otel-collector self-telemetry (:8888, wired via service.telemetry.metrics.readers)
  # plus the prometheus exporter output (:8889) that forwards ingested OTLP metrics.
  - job_name: 'otel-collector'
    static_configs:
      - targets: ['otel-collector:8888', 'otel-collector:8889']
        labels:
          env: 'development'

  # Alertmanager self-metrics
  - job_name: 'alertmanager'
    static_configs:
      - targets: ['alertmanager:9093']
        labels:
          env: 'development'

  # Blackbox Exporter self-metrics
  - job_name: 'blackbox-exporter'
    static_configs:
      - targets: ['blackbox-exporter:9115']
        labels:
          env: 'development'

  # Blackbox probes — hit each critical HTTP endpoint through the
  # exporter's http_2xx module. Prometheus queries surface probe_success
  # + probe_duration_seconds per instance.
  - job_name: 'blackbox-http'
    metrics_path: /probe
    params:
      module: [http_2xx]
    static_configs:
      - targets:
          - 'http://kafka-connect:8083/'
          - 'http://prometheus:9090/-/ready'
          - 'http://alertmanager:9093/-/ready'
          - 'http://loki:3100/ready'
          - 'http://tempo:3200/ready'
          - 'http://pyroscope:4040/ready'
          - 'http://grafana:3000/api/health'
    relabel_configs:
      - source_labels: [__address__]
        target_label: __param_target
      - source_labels: [__param_target]
        target_label: instance
      - target_label: __address__
        replacement: blackbox-exporter:9115

  # Cruise Control — deferred to PR#5
  # - job_name: 'cruise-control'
  #   static_configs:
  #     - targets: ['cruise-control:9090']
  #       labels:
  #         env: 'development'
  #         cluster: 'kafka-kraft-cluster'

  # Loki self-metrics
  - job_name: 'loki'
    metrics_path: /metrics
    static_configs:
      - targets: ['loki:3100']
        labels:
          env: 'development'

  # Tempo self-metrics
  - job_name: 'tempo'
    metrics_path: /metrics
    static_configs:
      - targets: ['tempo:3200']
        labels:
          env: 'development'

  # Pyroscope self-metrics
  - job_name: 'pyroscope'
    metrics_path: /metrics
    static_configs:
      - targets: ['pyroscope:4040']
        labels:
          env: 'development'
