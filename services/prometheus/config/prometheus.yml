# Prometheus configuration file
global:
  scrape_interval: 15s
  evaluation_interval: 15s
  external_labels:
    monitor: 'kafka-monitor'

# Alerting — Alertmanager over HTTPS with lab CA
alerting:
  alertmanagers:
    - scheme: https
      tls_config:
        ca_file: /certs/ca/ca-bundle.pem
      static_configs:
        - targets:
            - alertmanager:9093

rule_files:
  - /etc/prometheus/rules/kafka.rules.yml

scrape_configs:
  # Prometheus self — HTTPS with lab CA
  - job_name: 'prometheus'
    scheme: https
    tls_config:
      ca_file: /certs/ca/ca-bundle.pem
    static_configs:
      - targets: ['prometheus:9090']

  # Kafka Controllers — JMX Exporter (plaintext, migration deferred)
  - job_name: 'kafka-controllers'
    static_configs:
      - targets:
          - 'controller1:7071'
          - 'controller2:7071'
          - 'controller3:7071'
        labels:
          env: 'development'
          cluster: 'kafka-kraft-cluster'
          role: 'controller'

  # Kafka Brokers — JMX Exporter over HTTPS (per-broker leaf cert)
  - job_name: 'kafka-brokers'
    scheme: https
    tls_config:
      ca_file: /certs/ca/ca-bundle.pem
    static_configs:
      - targets:
          - 'broker1:7071'
          - 'broker2:7071'
          - 'broker3:7071'
        labels:
          env: 'development'
          cluster: 'kafka-kraft-cluster'
          role: 'broker'

  # Schema Registry — JMX Exporter over HTTPS
  - job_name: 'schema-registry'
    scheme: https
    tls_config:
      ca_file: /certs/ca/ca-bundle.pem
    static_configs:
      - targets: ['schema-registry:7071']
        labels:
          env: 'development'
          cluster: 'kafka-kraft-cluster'

  # Kafka Connect — JMX Exporter over HTTPS
  - job_name: 'kafka-connect'
    scheme: https
    tls_config:
      ca_file: /certs/ca/ca-bundle.pem
    static_configs:
      - targets: ['kafka-connect:7071']
        labels:
          env: 'development'
          cluster: 'kafka-kraft-cluster'

  # KMinion — plaintext /metrics (no TLS surface yet)
  - job_name: 'kminion'
    static_configs:
      - targets: ['kminion:8080']
        labels:
          env: 'development'
          cluster: 'kafka-kraft-cluster'

  # otel-collector self-telemetry (:8888) + prom exporter (:8889) — plaintext
  - job_name: 'otel-collector'
    static_configs:
      - targets: ['otel-collector:8888', 'otel-collector:8889']
        labels:
          env: 'development'

  # Alertmanager self-metrics — HTTPS
  - job_name: 'alertmanager'
    scheme: https
    tls_config:
      ca_file: /certs/ca/ca-bundle.pem
    static_configs:
      - targets: ['alertmanager:9093']
        labels:
          env: 'development'

  # Blackbox Exporter self-metrics — plaintext
  - job_name: 'blackbox-exporter'
    static_configs:
      - targets: ['blackbox-exporter:9115']
        labels:
          env: 'development'

  # Blackbox probes — target scheme matches each backend
  - job_name: 'blackbox-http'
    metrics_path: /probe
    params:
      module: [http_2xx]
    static_configs:
      - targets:
          - 'http://kafka-connect:8083/'
          - 'https://prometheus:9090/-/ready'
          - 'https://alertmanager:9093/-/ready'
          - 'https://loki:3100/ready'
          - 'https://tempo:3200/ready'
          - 'http://pyroscope:4040/ready'
          - 'https://grafana:3000/api/health'
    relabel_configs:
      - source_labels: [__address__]
        target_label: __param_target
      - source_labels: [__param_target]
        target_label: instance
      - target_label: __address__
        replacement: blackbox-exporter:9115

  # Loki self-metrics — HTTPS
  - job_name: 'loki'
    scheme: https
    tls_config:
      ca_file: /certs/ca/ca-bundle.pem
    metrics_path: /metrics
    static_configs:
      - targets: ['loki:3100']
        labels:
          env: 'development'

  # Tempo self-metrics — HTTPS
  - job_name: 'tempo'
    scheme: https
    tls_config:
      ca_file: /certs/ca/ca-bundle.pem
    metrics_path: /metrics
    static_configs:
      - targets: ['tempo:3200']
        labels:
          env: 'development'

  # Pyroscope self-metrics — plaintext (1.7.1 ignores http_tls_config)
  - job_name: 'pyroscope'
    metrics_path: /metrics
    static_configs:
      - targets: ['pyroscope:4040']
        labels:
          env: 'development'
