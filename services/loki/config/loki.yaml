auth_enabled: false

server:
  http_listen_port: 3100
  grpc_listen_port: 9096
  http_tls_config:
    cert_file: /certs/pem/loki/tls.crt
    key_file: /certs/pem/loki/tls.key
  # grpc_tls_config intentionally omitted: Loki 3.x runs many internal
  # gRPC clients in single-binary mode (frontend_scheduler_worker,
  # ingester_client, frontend_worker, ruler ring, pattern_ingester, ...)
  # and each has its own grpc_client_config with tls_enabled. Even after
  # setting instance_addr:loki + tls on ingester_client + frontend_worker,
  # frontend_scheduler_worker still bypasses TLS and self-loops fail. The
  # gRPC port stays on the observability network only — no external
  # publish — so risk is bounded. Revisit if we split single-binary into
  # microservices, at which point every hop gets its own grpc_client_config
  # and it's worth the surface.

common:
  instance_addr: 127.0.0.1
  path_prefix: /loki
  storage:
    filesystem:
      chunks_directory: /loki/chunks
      rules_directory: /loki/rules
  replication_factor: 1
  ring:
    kvstore:
      store: inmemory

query_range:
  results_cache:
    cache:
      embedded_cache:
        enabled: true
        max_size_mb: 100

schema_config:
  configs:
    - from: 2020-10-24
      store: tsdb
      object_store: filesystem
      schema: v13
      index:
        prefix: index_
        period: 24h

limits_config:
  retention_period: 168h

compactor:
  working_directory: /loki/retention
  delete_request_store: filesystem
  retention_enabled: true

ruler:
  alertmanager_url: https://alertmanager:9093
  alertmanager_client:
    tls_ca_path: /certs/ca/ca-bundle.pem
    tls_server_name: alertmanager

analytics:
  reporting_enabled: false
